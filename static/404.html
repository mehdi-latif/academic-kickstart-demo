<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <title>Redirection - Mehdi LATIF</title>
    <meta name="robots" content="noindex">

    <script>
        (function () {
            const path = window.location.pathname;

            let target = "/fr/";

            if (path.startsWith("/en/")) {
                target = "/en/";
            } else if (path.startsWith("/fr/")) {
                target = "/fr/";
            }

            window.location.replace(target);
        })();
    </script>
</head>

<body>
    <p>Redirection…</p>
    <p>
        <a href="/fr/">Accueil</a> —
        <a href="/en/">Home</a>
    </p>
</body>

</html>
